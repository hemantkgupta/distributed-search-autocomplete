# Aggregator — stateless coordinator. Deployment (not StatefulSet)
# because any Pod can serve any request.
#
# The aggregator carries no durable state; the only "state" is the
# in-memory shard map watched from etcd, the principal cache, and the
# tenant pool cache — all of which are reconstructable on Pod start.
#
# HPA scales on CPU + custom request-rate metric (a Prometheus
# adapter scrapes the queries_total counter and exposes it to the
# Kubernetes metrics server).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aggregator
  namespace: typeahead
spec:
  replicas: 12
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 4
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aggregator
  template:
    metadata:
      labels:
        app: aggregator
        tier: coordination
    spec:
      terminationGracePeriodSeconds: 30   # drain in-flight before SIGKILL
      containers:
        - name: aggregator
          image: distributed-search-autocomplete/aggregator:0.1.0
          ports:
            - { name: http,    containerPort: 8080 }
            - { name: metrics, containerPort: 9090 }
          envFrom:
            - configMapRef: { name: typeahead-config }
          resources:
            requests: { cpu: "2",  memory: "4Gi" }
            limits:   { cpu: "4",  memory: "6Gi" }
          readinessProbe:
            httpGet: { path: /ready, port: metrics }
            initialDelaySeconds: 5
            periodSeconds: 3
          livenessProbe:
            httpGet: { path: /health, port: metrics }
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aggregator
  namespace: typeahead
spec:
  selector: { app: aggregator }
  ports:
    - { name: http,    port: 8080,  targetPort: http }
    - { name: metrics, port: 9090,  targetPort: metrics }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aggregator
  namespace: typeahead
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aggregator
  minReplicas: 6
  maxReplicas: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }
    - type: Pods
      pods:
        metric:
          name: queries_per_second
        target: { type: AverageValue, averageValue: "1500" }
