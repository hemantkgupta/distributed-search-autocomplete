# Periodic index build — every 6 hours. The CronJob spawns a Job that
# scans the corpus, builds new FST artifacts per shard, runs the
# verifier (Verifier.sampledTopOne), and atomically promotes via the
# etcd alias. Promotions are idempotent and ordered; a failed verify
# leaves the previous artifact active.
#
# A CronJob is appropriate because the build is long-running (~2h on
# the production reference corpus) and triggered on a schedule plus
# on-demand from the delta-tier compaction signal (which the delta
# tier surfaces by writing to a known etcd key the CronJob's
# coordinator watches).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: index-build
  namespace: typeahead
spec:
  schedule: "0 */6 * * *"           # every 6 hours
  concurrencyPolicy: Forbid          # one build at a time
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1                # one retry on transient failure
      activeDeadlineSeconds: 14400   # 4-hour cap
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: index-build
              image: distributed-search-autocomplete/index-build:0.1.0
              envFrom:
                - configMapRef: { name: typeahead-config }
              resources:
                requests: { cpu: "8",  memory: "32Gi" }
                limits:   { cpu: "16", memory: "48Gi" }
              args:
                - --concurrency=8
                - --shards-per-batch=4
                - --verifier-miss-ratio=0.001
                - --drain-window-seconds=60
